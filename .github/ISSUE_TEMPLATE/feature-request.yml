name: Feature Request
description: Propose a new feature or enhancement
labels: ["feat"]
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: A clear and concise description of the feature.
      placeholder: What problem does this solve? What does the feature do?
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: What is in scope and out of scope for this feature?
      placeholder: |
        **In scope**: ...
        **Out of scope**: ...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this feature is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How important is this feature?
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How significant is the impact on users or the product?
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      description: Estimated effort to implement.
      options:
        - XS (1-2 h)
        - S (3-8 h)
        - M (1-2 d)
        - L (3-5 d)
        - XL (>7 d)
    validations:
      required: false

  - type: dropdown
    id: team
    attributes:
      label: Team / Squad
      description: Which team owns this?
      options:
        - Front End
        - Back End
        - Full Stack
        - DevOps
        - Design / UX
        - QA / Testing
        - Product Brainstorming
        - Admin / Housekeeping
    validations:
      required: false
