name: Documentation
description: Documentation additions or improvements
labels: ["documentation"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What documentation needs to be created or updated?
      placeholder: Describe the documentation change and its motivation.
    validations:
      required: true

  - type: textarea
    id: scope
    attributes:
      label: Scope
      description: Which files, sections, or areas are affected?
      placeholder: |
        **In scope**: ...
        **Out of scope**: ...
    validations:
      required: true

  - type: textarea
    id: acceptance-criteria
    attributes:
      label: Acceptance Criteria
      description: How will we know this documentation work is complete?
      placeholder: |
        - [ ] Criterion 1
        - [ ] Criterion 2
    validations:
      required: false

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      description: How urgent is this documentation?
      options:
        - P0
        - P1
        - P2
    validations:
      required: true

  - type: dropdown
    id: impact
    attributes:
      label: Impact
      description: How significant is the impact?
      options:
        - High
        - Medium
        - Low
    validations:
      required: true

  - type: dropdown
    id: effort
    attributes:
      label: Effort
      description: Estimated effort.
      options:
        - XS (1-2 h)
        - S (3-8 h)
        - M (1-2 d)
        - L (3-5 d)
        - XL (>7 d)
    validations:
      required: false

  - type: dropdown
    id: team
    attributes:
      label: Team / Squad
      description: Which team owns this?
      options:
        - Front End
        - Back End
        - Full Stack
        - DevOps
        - Design / UX
        - QA / Testing
        - Product Brainstorming
        - Admin / Housekeeping
    validations:
      required: false
