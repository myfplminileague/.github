# Reusable Workflow: Deployment Tracking on PR Merge
# Called by individual repos on pull_request:closed to track merged PRs for deployment.
#
# Scenario 1: PR has linked issues (Closes #X / Fixes #X)
#   -> Reopens the issue (GitHub auto-closes it on merge)
#   -> Adds it to the org project board with "Ready for Deployment" status
#
# Scenario 2: PR has no linked issue
#   -> Creates a new tracking issue
#   -> Adds it to the org project board with "Ready for Deployment" status
#
# The deployment engineer sees all items in the "Ready for Deployment" column on Wednesday,
# deploys them, and moves to "Done" (which auto-closes the issue).

name: Deployment Tracking

on:
  workflow_call:
    secrets:
      PROJECT_PAT:
        description: "PAT with project write access for Projects v2 mutations"
        required: true

jobs:
  track-deployment:
    # Only run when the PR was actually merged (not just closed)
    if: github.event.pull_request.merged == true && !startsWith(github.head_ref, 'release-please')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
      pull-requests: read

    steps:
      - name: Track merged PR for deployment
        uses: actions/github-script@v7
        env:
          PROJECT_PAT: ${{ secrets.PROJECT_PAT }}
        with:
          # Use default GITHUB_TOKEN for repo operations (issues, PRs)
          script: |
            const pr = context.payload.pull_request;
            const prNumber = pr.number;
            const prTitle = pr.title;
            const prUrl = pr.html_url;
            const mergedBy = pr.merged_by?.login || 'unknown';

            // =================================================================
            // HELPER: Add an issue to the org project with "Ready for Deployment" status
            // Uses PROJECT_PAT (separate from GITHUB_TOKEN) for org project access
            // =================================================================
            async function graphqlWithPAT(query, variables = {}) {
              const response = await fetch('https://api.github.com/graphql', {
                method: 'POST',
                headers: {
                  'Authorization': `bearer ${process.env.PROJECT_PAT}`,
                  'Content-Type': 'application/json',
                },
                body: JSON.stringify({ query, variables }),
              });
              const result = await response.json();
              if (result.errors) {
                throw new Error(result.errors.map(e => e.message).join(', '));
              }
              return result.data;
            }

            async function addToProjectWithDeploymentStatus(issueNodeId) {
              // Step 1: Query project structure to get IDs dynamically
              const projectQuery = `query($org: String!, $number: Int!) {
                organization(login: $org) {
                  projectV2(number: $number) {
                    id
                    field(name: "Status") {
                      ... on ProjectV2SingleSelectField {
                        id
                        options {
                          id
                          name
                        }
                      }
                    }
                  }
                }
              }`;

              const projectData = await graphqlWithPAT(projectQuery, {
                org: 'myfplminileague',
                number: 1,
              });

              const projectId = projectData.organization.projectV2.id;
              const statusField = projectData.organization.projectV2.field;
              const deploymentOption = statusField.options.find(
                (opt) => opt.name === 'Ready for Deployment',
              );

              if (!deploymentOption) {
                core.error(
                  'Could not find "Ready for Deployment" status option in project. Available options: ' +
                    statusField.options.map((o) => o.name).join(', '),
                );
                return;
              }

              // Step 2: Add issue to the project
              const addItemMutation = `mutation($projectId: ID!, $contentId: ID!) {
                addProjectV2ItemById(input: {
                  projectId: $projectId
                  contentId: $contentId
                }) {
                  item {
                    id
                  }
                }
              }`;

              const addResult = await graphqlWithPAT(addItemMutation, {
                projectId,
                contentId: issueNodeId,
              });

              const itemId = addResult.addProjectV2ItemById.item.id;

              // Step 3: Set the status to "Ready for Deployment"
              const updateStatusMutation = `mutation($projectId: ID!, $itemId: ID!, $fieldId: ID!, $optionId: String!) {
                updateProjectV2ItemFieldValue(input: {
                  projectId: $projectId
                  itemId: $itemId
                  fieldId: $fieldId
                  value: { singleSelectOptionId: $optionId }
                }) {
                  projectV2Item {
                    id
                  }
                }
              }`;

              await graphqlWithPAT(updateStatusMutation, {
                projectId,
                itemId,
                fieldId: statusField.id,
                optionId: deploymentOption.id,
              });

              core.info(
                `Added item to project and set status to "Ready for Deployment"`,
              );
            }

            // =================================================================
            // Step 1: Find linked issues via GraphQL
            // =================================================================
            let linkedIssues = [];
            try {
              const query = `query($owner: String!, $repo: String!, $number: Int!) {
                repository(owner: $owner, name: $repo) {
                  pullRequest(number: $number) {
                    closingIssuesReferences(first: 50) {
                      nodes {
                        number
                        id
                        repository {
                          name
                          owner {
                            login
                          }
                        }
                      }
                    }
                  }
                }
              }`;

              const result = await github.graphql(query, {
                owner: context.repo.owner,
                repo: context.repo.repo,
                number: prNumber,
              });

              linkedIssues =
                result.repository.pullRequest.closingIssuesReferences.nodes;
            } catch (error) {
              core.warning(
                `GraphQL query failed, falling back to regex: ${error.message}`,
              );

              // Fallback: parse PR body for issue references
              const body = pr.body || '';
              const pattern =
                /(?:close[sd]?|fix(?:e[sd])?|resolve[sd]?)\s+#(\d+)/gi;
              let match;
              while ((match = pattern.exec(body)) !== null) {
                linkedIssues.push({
                  number: parseInt(match[1]),
                  id: null, // Will need to fetch node_id separately
                  repository: {
                    name: context.repo.repo,
                    owner: { login: context.repo.owner },
                  },
                });
              }
            }

            core.info(
              `Found ${linkedIssues.length} linked issue(s) for PR #${prNumber}`,
            );

            if (linkedIssues.length > 0) {
              // =================================================================
              // Scenario 1: Reopen linked issues and add to project
              // =================================================================
              for (const issue of linkedIssues) {
                const issueOwner = issue.repository.owner.login;
                const issueRepo = issue.repository.name;
                const issueNumber = issue.number;

                // Only handle same-repo issues (cross-repo needs a PAT with broader scope)
                if (
                  issueOwner !== context.repo.owner ||
                  issueRepo !== context.repo.repo
                ) {
                  core.warning(
                    `Skipping cross-repo issue ${issueOwner}/${issueRepo}#${issueNumber} - requires manual handling`,
                  );
                  continue;
                }

                try {
                  // Reopen the issue (GitHub auto-closed it on merge)
                  await github.rest.issues.update({
                    owner: issueOwner,
                    repo: issueRepo,
                    issue_number: issueNumber,
                    state: 'open',
                  });

                  // Get the issue node_id if not available from GraphQL
                  let issueNodeId = issue.id;
                  if (!issueNodeId) {
                    const { data: issueData } = await github.rest.issues.get({
                      owner: issueOwner,
                      repo: issueRepo,
                      issue_number: issueNumber,
                    });
                    issueNodeId = issueData.node_id;
                  }

                  // Add to project with "Ready for Deployment" status
                  await addToProjectWithDeploymentStatus(issueNodeId);

                  // Add a comment explaining the state change
                  await github.rest.issues.createComment({
                    owner: issueOwner,
                    repo: issueRepo,
                    issue_number: issueNumber,
                    body: [
                      `**Ready for deployment**`,
                      ``,
                      `Merged to \`main\` via ${prUrl}`,
                      `This issue has been moved to the **Ready for Deployment** status on the project board.`,
                      `It will be deployed on the next Wednesday production deployment.`,
                      ``,
                      `_This issue was automatically reopened by the deployment tracking workflow._`,
                    ].join('\n'),
                  });

                  core.info(
                    `Processed issue #${issueNumber} - reopened and moved to Ready for Deployment`,
                  );
                } catch (error) {
                  core.error(
                    `Failed to process issue #${issueNumber}: ${error.message}`,
                  );
                }
              }
            } else {
              // =================================================================
              // Scenario 2: No linked issues - create a tracking issue
              // =================================================================
              core.info(
                `No linked issues for PR #${prNumber}. Creating tracking issue.`,
              );

              try {
                const newIssue = await github.rest.issues.create({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  title: `Deploy: ${prTitle} (#${prNumber})`,
                  labels: ['deploy-tracking'],
                  body: [
                    `## Deployment Tracking`,
                    ``,
                    `This issue was auto-created because PR #${prNumber} was merged to \`main\` without a linked issue.`,
                    ``,
                    `**PR**: ${prUrl}`,
                    `**Merged by**: @${mergedBy}`,
                    ``,
                    `---`,
                    `_Move to "Done" on the project board after the Wednesday production deployment._`,
                    ``,
                    `### Priority`,
                    ``,
                    `P2`,
                    ``,
                    `### Impact`,
                    ``,
                    `Low`,
                    ``,
                    `### Effort`,
                    ``,
                    `XS (1-2 h)`,
                    ``,
                    `### Team / Squad`,
                    ``,
                    `DevOps`,
                  ].join('\n'),
                });

                // Add the new issue to project with "Ready for Deployment" status
                await addToProjectWithDeploymentStatus(newIssue.data.node_id);

                core.info(
                  `Created tracking issue #${newIssue.data.number} and moved to Ready for Deployment`,
                );
              } catch (error) {
                core.error(
                  `Failed to create tracking issue: ${error.message}`,
                );
              }
            }
